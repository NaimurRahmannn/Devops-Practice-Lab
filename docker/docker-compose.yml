services:
  postgres:
    image: postgres:16-alpine
    container_name: employee-postgres
    environment:
      POSTGRES_DB: employee_db
      POSTGRES_USER: employee_user
      POSTGRES_PASSWORD: employee_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U employee_user -d employee_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  employee-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: employee-api:1.0
    container_name: employee-api
    environment:
      DATABASE_URL: postgresql+psycopg2://employee_user:employee_password@postgres:5432/employee_db
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
